name: Production Gate — CI & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

jobs:
  production-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type Check (Strict)
        run: npm run typecheck

      - name: Security Check (Policy-as-Code)
        run: npm run test:security

      - name: Legacy Bypass Check
        run: |
          echo "🔒 Legacy Pattern Check"
          if grep -r "tenantId === null" src/app/actions/ 2>/dev/null; then
            echo "❌ FAIL: Null tenant bypass found!"
            exit 1
          fi
          if grep -r "fakeReq\|fakeRes" src/app/api/ 2>/dev/null; then
            echo "❌ FAIL: Legacy fakeReq/fakeRes found!"
            exit 1
          fi
          if grep -r "quba-ai-secret" src/ 2>/dev/null; then
            echo "❌ FAIL: Hardcoded secret found!"
            exit 1
          fi
          echo "✅ All legacy security checks passed"

      - name: Build (Vercel Simulation)
        run: npm run build
